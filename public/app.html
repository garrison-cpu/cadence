<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>

<title>Cadence — Find the beat your audience is already moving to.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; min-height: 100%; background: #FAFBFA; }
  body { font-family: 'Geist', system-ui, sans-serif; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  *, *::before, *::after { box-sizing: border-box; }
  input, textarea, select, button { font-family: inherit; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(10,14,10,0.18); border-radius: 3px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  @keyframes pulse-ring { 0% { box-shadow: 0 0 0 0 rgba(0,214,143,.45); } 70% { box-shadow: 0 0 0 8px rgba(0,214,143,0); } 100% { box-shadow: 0 0 0 0 rgba(0,214,143,0); } }
  @keyframes float-a { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
  @keyframes shimmer { 0% { background-position: -200px 0; } 100% { background-position: 200px 0; } }
  a { color: inherit; }
  .gt { background-image: linear-gradient(105deg, #6EE7B7 0%, #2DD4BF 38%, #67E8F9 100%); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .gt-bg { background-image: linear-gradient(105deg, #6EE7B7 0%, #2DD4BF 38%, #67E8F9 100%); }
  .serif-i { font-family: 'Instrument Serif', Georgia, serif; font-style: italic; font-weight: 400; }
  .serif { font-family: 'Instrument Serif', Georgia, serif; font-weight: 400; }

  /* ──────────────────────────────────────────────────────────────────────
     MOBILE OVERRIDES — root cause: on a phone the app drops out of its fixed
     viewport layout into normal document flow (handled by the isMobile flag in
     App). These rules back that up: inline grid-template-columns are overridden
     with !important (inline styles otherwise win), and every multi-column grid
     collapses to a single stacked column. No fixed viewport heights, no hidden
     overflow, no horizontal scroll. Breakpoint matches MOBILE_Q in App (900px).
     ────────────────────────────────────────────────────────────────────── */
  html, body { max-width: 100%; overflow-x: hidden; }

  @media (max-width: 900px) {
    /* Collapse every multi-column grid to a single stacked column. !important is
       required because Preact writes grid-template-columns as an inline style. */
    div[style*="grid-template-columns: 1fr 1fr"],
    div[style*="grid-template-columns: 1.1fr 1fr"],
    div[style*="grid-template-columns: 1.15fr 1fr"],
    div[style*="grid-template-columns: 1.45fr 1fr"],
    div[style*="grid-template-columns: 1fr 300px"],
    div[style*="grid-template-columns: 380px 1fr"],
    div[style*="grid-template-columns: repeat(3"],
    div[style*="grid-template-columns: repeat(4"],
    div[style*="grid-template-columns: repeat(5"],
    div[style*="grid-template-columns: repeat(7"],
    section[style*="grid-template-columns: 1.1fr 1fr"],
    section[style*="grid-template-columns: repeat(3"],
    section[style*="grid-template-columns: repeat(5"] {
      grid-template-columns: 1fr !important;
      gap: 14px !important;
    }

    /* Grid items default to min-width:auto, which lets a column grow to its
       content's intrinsic width and overflow the viewport. Force them to shrink. */
    div[style*="display: grid"] > *,
    section[style*="display: grid"] > * { min-width: 0 !important; }

    /* Reduce big page paddings so content fits the viewport width */
    div[style*="padding: 28px 32px"],
    div[style*="padding: 40px 56px"],
    div[style*="padding: 40px 44px 56px"],
    div[style*="padding: 40px 48px"],
    div[style*="padding: 40px 44px"],
    div[style*="padding: 28px 44px"],
    div[style*="padding: 32px 36px 40px"],
    div[style*="padding: 32px 40px"] {
      padding: 18px 16px !important;
    }

    /* Any pane that locks to viewport height / hides overflow flows instead */
    div[style*="height: 100%"][style*="overflow: hidden"],
    div[style*="height: calc(100vh - 65px)"] {
      height: auto !important;
      overflow: visible !important;
    }
    div[style*="overflow-y: auto"] { overflow-y: visible !important; }

    /* Header — allow wrap, smaller padding */
    header[style*="padding: 14px 28px"] {
      padding: 10px 14px !important;
      flex-wrap: wrap !important;
      gap: 8px !important;
    }

    /* Nav — horizontally scrollable instead of overflowing the header */
    header nav {
      overflow-x: auto !important;
      max-width: 100% !important;
      margin-left: 0 !important;
      scrollbar-width: none;
    }
    header nav::-webkit-scrollbar { display: none; }

    /* Modal — full width with small inset */
    div[style*="position: fixed"][style*="inset: 0"] > div[style*="width: 540px"] {
      width: 100% !important;
      padding: 20px !important;
    }

    /* Oversized display headings shrink so they never overflow the viewport */
    h1 { font-size: clamp(30px, 9vw, 56px) !important; }
  }

  @media (max-width: 600px) {
    /* Bigger headlines wrap rather than overflow */
    h1, h2, h3 { word-wrap: break-word; overflow-wrap: break-word; }
  }
</style>
</head>
<body>

<script type="module">
import { h, render, Fragment } from 'https://esm.sh/preact@10.19.2';
import { useState, useEffect, useMemo, useRef } from 'https://esm.sh/preact@10.19.2/hooks';

/* ════════════════════════════════════════════════════════════════════════════
   CONFIG  — API calls now go through the same-origin proxy (/api/*).
   The provider URLs and keys live only on the server, never in the browser.
   ════════════════════════════════════════════════════════════════════════════ */
const CLAUDE_MODEL = 'claude-sonnet-4-6'; // display only; server sets the real model
const DEFAULT_RAPID_KEY  = '';
const DEFAULT_CLAUDE_KEY = '';

const FI = "'Geist', system-ui, sans-serif";
const FM = "'Geist Mono', ui-monospace, monospace";
const FS = "'Instrument Serif', Georgia, serif";

/* ════════════════════════════════════════════════════════════════════════════
   WRITING STYLE + OUTPUT SANITIZER
   STYLE is appended to every copy-writing prompt. cleanCopy/deepClean are the
   backstop: even if the model slips, no em/en dash or emoji reaches what we
   show or save. Belt and suspenders.
   ════════════════════════════════════════════════════════════════════════════ */
const STYLE = `WRITING RULES (hard constraints, follow exactly):
- Never use an em-dash (—) or en-dash (–). For a pause, use a period or a comma, or rewrite the sentence. Plain hyphens in compounds like "30-day" are fine.
- Never use emoji or emoticons of any kind.
- Write like a real social media manager who runs this account, not like a brand and not like an AI. Specific, plain, confident.
- Do not use these AI-tell phrasings: "it's not just X, it's Y", "in today's world", "dive in", "delve", "unlock", "elevate", "supercharge", "level up", "game-changer", "the result?", "look no further", "say goodbye to".
- Vary sentence length. Use contractions. Cut throat-clearing and filler. Lead with the point.
- Match how top accounts in this niche actually post, not generic marketing copy.`;

function cleanCopy(s) {
  if (typeof s !== 'string') return s;
  return s
    .replace(/\s*[—–]\s*/g, ', ')                 // em/en dash -> comma (rarely fires if prompt holds)
    .replace(/\p{Emoji_Presentation}/gu, '')        // colored emoji
    .replace(/[\u{1F1E6}-\u{1F1FF}]/gu, '')         // flag pairs
    .replace(/[\u200D\uFE0F\u20E3]/gu, '')          // ZWJ, variation selector, keycap
    .replace(/[ \t]{2,}/g, ' ')                     // collapse leftover spaces
    .replace(/\s+([,.!?])/g, '$1')                  // tidy space-before-punctuation
    .trim();
}
function deepClean(obj) {
  if (typeof obj === 'string') return cleanCopy(obj);
  if (Array.isArray(obj)) return obj.map(deepClean);
  if (obj && typeof obj === 'object') {
    const out = {};
    for (const k of Object.keys(obj)) out[k] = deepClean(obj[k]);
    return out;
  }
  return obj;
}

/* ════════════════════════════════════════════════════════════════════════════
   FORMAT TAXONOMY  — re-tinted for the Cadence palette
   (kept as information, not decoration — taxonomy preserved)
   ════════════════════════════════════════════════════════════════════════════ */
const FORMAT_ACCENTS = [
  { key: 'short_video', bg: '#34D399', fg: '#04231A', label: 'Short-form video', soft: '#D7F7E8' },
  { key: 'carousel',    bg: '#22D3EE', fg: '#053040', label: 'Carousels',        soft: '#CFF4FB' },
  { key: 'reply',       bg: '#2DD4BF', fg: '#053B36', label: 'Reply threads',     soft: '#D2F4EF' },
  { key: 'long_form',   bg: '#1F2937', fg: '#FAFBFA', label: 'Long-form',         soft: '#DDE1E5' },
  { key: 'stories',     bg: '#F59E0B', fg: '#231708', label: 'Stories',           soft: '#FCE4BA' },
];

/* Platform brand colors — kept recognizeable but understated (dot-only accents) */
const PLAT = {
  tiktok:        { dot: '#0A0E0A', label: 'TikTok' },
  instagram:     { dot: '#E1306C', label: 'Instagram' },
  reddit:        { dot: '#FF4500', label: 'Reddit' },
  google_trends: { dot: '#4285F4', label: 'Google Trends' },
  youtube:       { dot: '#FF0000', label: 'YouTube' },
  threads:       { dot: '#222',    label: 'Threads' },
};

/* ════════════════════════════════════════════════════════════════════════════
   THEME — one helper, one direction ("Full")
   "Full" — push the marketing warmth deep into the app.
   Honors the `dark` flag and returns the matching dark or light palette.
   ════════════════════════════════════════════════════════════════════════════ */
function themeFor(dark) {
  const palette = dark ? {
    canvas: '#0A0E0A',     surface: '#14181A',     surfaceHi: '#1F2422',
    ink: '#FAFBFA',        body: '#C8CFCA',         bodyMid: '#A8B0AA', mute: '#8A938C',
    hairline: '#1F2422',   hairlineSoft: '#161A18',
    primary: '#FAFBFA',    onPrimary: '#0A0E0A',
  } : {
    canvas: '#FAFBFA',     surface: '#FFFFFF',      surfaceHi: '#F2F4F2',
    ink: '#0A0E0A',        body: '#3B433D',         bodyMid: '#6B756D', mute: '#9AA29C',
    hairline: '#E4E7E5',   hairlineSoft: '#EEF0EE',
    primary: '#0A0E0A',    onPrimary: '#FAFBFA',
  };

  const shared = {
    dark, ...palette,
    accent: '#00D68F', accentInk: '#04231A', accentDeep: '#00A870',
    g1: '#6EE7B7', g2: '#2DD4BF', g3: '#67E8F9',
    fontDisplay: FI, fontBody: FI, fontMono: FM, fontSerif: FS,
    sh1: dark ? '0 1px 2px rgba(0,0,0,.5)' : '0 1px 2px rgba(10,14,10,.04), 0 1px 1px rgba(10,14,10,.03)',
    sh2: dark ? '0 4px 12px -2px rgba(0,0,0,.6)' : '0 4px 8px -2px rgba(10,14,10,.05), 0 2px 4px -2px rgba(10,14,10,.04)',
    sh3: dark ? '0 12px 24px -8px rgba(0,0,0,.7)' : '0 12px 24px -8px rgba(10,14,10,.08), 0 4px 8px -4px rgba(10,14,10,.04)',
    sh4: dark ? '0 24px 48px -16px rgba(0,0,0,.8)' : '0 24px 48px -16px rgba(10,14,10,.16), 0 8px 16px -8px rgba(10,14,10,.06)',
  };

  return { ...shared,
    canvas: dark ? '#0A0E0A' : '#FAFBFA',
    surface: dark ? '#14181A' : '#FFFFFF',
    rCard: 22, rInput: 14, rChip: 999, rTile: 14,
    cardBorder: false, cardShadow: 'sh3',
    eyebrowFont: FM, headerFont: FS, displayFont: FI,
    headerWeight: 400, h1Weight: 700,
    gridDensity: 1.12,
    surfaceTinted: true,
    accentMode: 'surfaces', // gradient washes on Discover, eyebrows, big radii
  };
}

/* ════════════════════════════════════════════════════════════════════════════
   STORE / FORMAT / UTIL  — identical contract
   ════════════════════════════════════════════════════════════════════════════ */
const store = {
  get: (k, d) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : d; } catch { return d; } },
  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }
};
function fmt(n) { n = Number(n||0); if (n>=1e9) return (n/1e9).toFixed(1)+'B'; if (n>=1e6) return (n/1e6).toFixed(1)+'M'; if (n>=1e3) return (n/1e3).toFixed(1)+'K'; return String(n); }
function heatLabel(x) { return { rising:'Rising', hot:'Hot', viral:'Viral' }[x] || 'Rising'; }
function heatColor(x) { return x==='viral' ? '#F43F5E' : x==='hot' ? '#FB923C' : '#FACC15'; }
function useTick() {
  const [t, setT] = useState(0);
  useEffect(() => { let raf, s; const loop = ts => { if (!s) s = ts; setT((ts-s)/1000); raf = requestAnimationFrame(loop); }; raf = requestAnimationFrame(loop); return () => cancelAnimationFrame(raf); }, []);
  return t;
}

/* ════════════════════════════════════════════════════════════════════════════
   API  — copied verbatim from index-v3-tool.html (zero functional changes)
   ════════════════════════════════════════════════════════════════════════════ */
async function tokGet(path) {
  // Proxied: the server attaches the RapidAPI key. No key in the browser.
  const r = await fetch('/api/tokapi' + path, { credentials: 'same-origin' });
  if (!r.ok) throw new Error('TokAPI ' + r.status);
  const data = await r.json();
  if (data && data.status_code != null && data.status_code !== 0) throw new Error('TokAPI logical error status_code=' + data.status_code);
  return data;
}
function parseVideos(raw) {
  let items = [];
  if (Array.isArray(raw)) items = raw;
  else if (raw?.search_item_list) items = raw.search_item_list.map(i => i.aweme_info || i);
  else if (raw?.aweme_list) items = raw.aweme_list;
  else if (raw?.data?.aweme_list) items = raw.data.aweme_list;
  else if (raw?.data?.video_list) items = raw.data.video_list;
  return items.slice(0,8).map(v => { const s = v.statistics||v.stats||{}; return { id: v.aweme_id||'', desc:(v.desc||'').substring(0,90), views: s.play_count||s.views||0, likes: s.digg_count||s.likes||0, author: v.author?.nickname||'', createTime: v.create_time || v.createTime || 0, url: v.aweme_id ? `https://www.tiktok.com/@${v.author?.unique_id||'tiktok'}/video/${v.aweme_id}` : null }; }).filter(v => v.views>0 || v.likes>0);
}
function computeBestTime(timestampsMs) {
  const ts = timestampsMs.filter(n => Number.isFinite(n) && n > 0);
  if (ts.length < 3) return null;
  const dates = ts.map(n => new Date(n));
  const hourCounts = new Array(24).fill(0);
  dates.forEach(d => hourCounts[d.getHours()]++);
  let bestStart = 0, bestSum = -1;
  for (let h = 0; h < 24; h++) {
    const sum = hourCounts[h] + hourCounts[(h + 1) % 24];
    if (sum > bestSum) { bestSum = sum; bestStart = h; }
  }
  const endH = (bestStart + 2) % 24;
  const dayCounts = new Array(7).fill(0);
  dates.forEach(d => dayCounts[d.getDay()]++);
  const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const ranked = dayCounts.map((c, i) => ({ c, i })).sort((a, b) => b.c - a.c);
  const topDays = [];
  if (ranked[0].c / ts.length >= 0.34) topDays.push(DAYS[ranked[0].i]);
  if (ranked[1] && ranked[1].c === ranked[0].c && topDays.length) topDays.push(DAYS[ranked[1].i]);
  const tz = Intl.DateTimeFormat().resolvedOptions().timeZone || 'your local time';
  const fmtH = h => { const ap = h < 12 ? 'AM' : 'PM'; const hr = h % 12 === 0 ? 12 : h % 12; return hr + ' ' + ap; };
  const dayStr = topDays.length ? topDays.join(' & ') + ', ' : '';
  return {
    label: `${dayStr}${fmtH(bestStart)}–${fmtH(endH)}`,
    rationale: `When the ${ts.length} top posts in this niche went live (shown in ${tz}).`
  };
}
async function claudeCall(prompt, useSearch=false, maxTokens=4000) {
  // Proxied: the server holds the Claude key and forwards to Anthropic.
  let r;
  try {
    r = await fetch('/api/claude', {
      method:'POST',
      headers: { 'Content-Type':'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify({ prompt, useSearch, maxTokens })
    });
  } catch (e) { throw new Error('Network error: ' + e.message); }
  let data;
  try { data = await r.json(); } catch { throw new Error('API returned non-JSON (HTTP ' + r.status + ')'); }
  if (r.status===401) throw new Error('Session expired — refresh and sign in again.');
  if (!r.ok || data.error) { const e = data.error||{}; const d = e.message || JSON.stringify(e); if (r.status===429) throw new Error('Rate limit (429). Wait and retry.\n'+d); throw new Error(`Claude API error ${r.status}: ${d}`); }
  return (data.content||[]).filter(b => b.type==='text').map(b => b.text).join('');
}
async function testClaudeKey(key) {
  // Keys now live server-side; this client-side test is no longer used.
  return { ok:true, msg:'Managed by server' };
}
async function fetchReddit(niche) {
  let posts = [];
  for (const q of [niche.replace(/\s+/g,'').toLowerCase(), niche.replace(/\s+/g,'_'), niche.split(' ')[0]]) {
    try { const r = await fetch(`/api/reddit/r/${q}/hot.json?limit=10`, { credentials:'same-origin' }); if (!r.ok) continue; const d = await r.json(); const kids = d?.data?.children||[]; if (kids.length>=4) { posts = kids.map(c => ({ title: c.data.title||'', score: c.data.score||0, comments: c.data.num_comments||0, subreddit: c.data.subreddit||q, url: `https://reddit.com${c.data.permalink}` })).filter(p => p.score>0); break; } } catch { continue; }
  }
  if (posts.length<3) { try { const r = await fetch(`/api/reddit/search.json?q=${encodeURIComponent(niche)}&sort=hot&limit=10&t=week`, { credentials:'same-origin' }); if (r.ok) { const d = await r.json(); posts = [...posts, ...(d?.data?.children||[]).map(c => ({ title: c.data.title||'', score: c.data.score||0, comments: c.data.num_comments||0, subreddit: c.data.subreddit||'', url: `https://reddit.com${c.data.permalink}` }))].slice(0,10); } } catch {} }
  return posts;
}

/* ════════════════════════════════════════════════════════════════════════════
   ENGINE ADAPTER  — map an engine THEME (Cadence scored it from real numbers,
   Claude grouped + wrote the creative layer) into the shape the TrendCard
   renders. A theme is topic-first: it can span several platforms, so instead of
   one platform identity we carry an evidence list (one real number per platform)
   and which platform has the most traction.

   HONEST LABELLING: everything in t.measured is REAL (measured by Cadence).
   Anything from t.generated is AI-written. We only flip the "est." tag off
   (engagementRateReal:true) when measured.engagementRate actually exists.
   ════════════════════════════════════════════════════════════════════════════ */
function platLabel(p) { return (PLAT[p] && PLAT[p].label) || (p || '').replace(/_/g, ' '); }

// one compact real number per platform for the evidence chip
function evidenceNumber(e) {
  // Google Trends is a 0-100 index, so its momentum (delta) reads truer than the
  // raw index value. Everything else shows its real count (views/score/likes).
  if (e.platform === 'google_trends') {
    return (e.deltaPct >= 0 ? '+' : '') + Math.round(e.deltaPct || 0) + '%';
  }
  return fmt(e.value);
}

function mapEngineTrend(t, i) {
  const m = t.measured || {};
  const erReal = m.engagementRate != null;
  const dom = t.dominantPlatform || (t.platforms && t.platforms[0]) || '';
  const breadth = m.breadth || (t.platforms ? t.platforms.length : 1);

  // evidence chips: platform + one compact real number, clickable when we have a link
  const evidence = (m.evidence || []).map(e => ({
    platform: e.platform,
    dot: (PLAT[e.platform] && PLAT[e.platform].dot) || '#2DD4BF',
    label: platLabel(e.platform) + ' ' + evidenceNumber(e),
    url: e.url || null,
  }));

  const out = {
    id: t.id || ('theme_' + (i + 1)),
    title: t.title,
    reasoning: cleanCopy(t.reasoning || ''),
    platform: dom,                       // dominant platform for any PLAT lookups
    dominantPlatform: dom,
    dominantPlatformLabel: platLabel(dom),
    breadth,
    evidence,
    // single-platform theme -> it's only just surfacing on one place
    emerging: breadth <= 1,
    emergingLabel: 'Emerging on ' + platLabel(dom),
    heat: m.heat,
    // "Why it's trending" — the AI-written angle (clearly the creative layer)
    hook: cleanCopy(t.generated?.whyTrending || t.generated?.angle || ''),
    // measured engagement (real) — formatted to a percentage, else em-dash
    engagementRate: erReal ? (m.engagementRate * 100).toFixed(1) + '%' : '—',
    engagementRateReal: erReal,          // real -> hide the "est." tag
    // REAL momentum vs baseline (measured), from the dominant member
    delta: (m.deltaPct >= 0 ? '+' : '') + Math.round(m.deltaPct || 0) + '%',
    contentAngles: t.generated?.angle ? [cleanCopy(t.generated.angle)] : [],
    captionHook: cleanCopy(t.generated?.captionHook || ''),
    hashtags: (t.generated?.hashtags || []).map(cleanCopy),
    // these stay model/heuristic estimates — left blank so they read "—" / "est."
    competition: '—',
    searchVolume: '—',
    bestTimeToPost: t.bestTimeToPost || '',
    bestTimeToPostReal: !!t.bestTimeToPostReal,
    postingTimeRationale: t.postingTimeRationale || '',
    searchInterest: t.searchInterest ?? null,
    searchInterestLabel: t.searchInterestLabel || null,
    // legacy per-platform link lists no longer populated (evidence chips replace them)
    realVideos: [],
    redditPosts: [],
    realYoutube: [],
  };

/* Brand mark — 5-bar waveform, gradient-filled */
function Mark({ size=22 }) {
  const gid = 'mark-' + size;
  return h('svg', { width: size, height: size, viewBox: '0 0 42 42', style: { display:'block', flexShrink: 0 } },
    h('defs', null, h('linearGradient', { id: gid, x1:0, y1:0, x2:42, y2:42 },
      h('stop', { offset:'0%', 'stop-color':'#6EE7B7' }),
      h('stop', { offset:'50%', 'stop-color':'#2DD4BF' }),
      h('stop', { offset:'100%', 'stop-color':'#67E8F9' })
    )),
    h('rect', { x:2,  y:18, width:5, height:6,  rx:2.5, fill:`url(#${gid})` }),
    h('rect', { x:10, y:12, width:5, height:18, rx:2.5, fill:`url(#${gid})` }),
    h('rect', { x:18, y:4,  width:5, height:34, rx:2.5, fill:`url(#${gid})` }),
    h('rect', { x:26, y:14, width:5, height:14, rx:2.5, fill:`url(#${gid})` }),
    h('rect', { x:34, y:16, width:5, height:10, rx:2.5, fill:`url(#${gid})` })
  );
}

/* Live dot — pulsing accent */
function LiveDot({ color='#00D68F', size=8 }) {
  return h('span', { style: { width:size, height:size, borderRadius:'50%', background:color, boxShadow:`0 0 0 4px ${color}33`, animation:'blink 2s infinite', display:'inline-block', flexShrink:0 } });
}

/* Sparkline — climbing curve, gradient stroke */
function Sparkline({ height=44, color, gradient=true }) {
  // Self-animating: own its tick so the whole app no longer re-renders ~60fps
  // just to drive a decorative sparkline. (Previously `t` was threaded from App,
  // forcing every screen — including the result carousel — to re-render each frame.)
  const t = useTick();
  const data = [12,18,22,19,28,35,31,42,48,55,61,58,72,84,78,92,88,95];
  const anim = data.map((v,i) => v*(0.78 + 0.22*Math.sin((t||0)*0.7 + i*0.32)));
  const max = Math.max(...anim), min = Math.min(...anim);
  const W=200, H=60;
  const pts = anim.map((v,i) => [i/(anim.length-1)*W, H-(v-min)/(max-min||1)*H]);
  const d = pts.map((p,i) => (i===0?'M':'L') + p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ');
  const gid = 'spk-' + (color||'g').replace(/[^a-z0-9]/gi,'') + height;
  return h('svg', { viewBox: `0 0 ${W} ${H}`, preserveAspectRatio:'none', style:{ width:'100%', height, display:'block' } },
    h('defs', null,
      gradient
        ? h('linearGradient', { id: gid+'-s', x1:0, y1:0, x2:1, y2:0 },
            h('stop', { offset:'0%', 'stop-color':'#6EE7B7' }),
            h('stop', { offset:'50%','stop-color':'#2DD4BF' }),
            h('stop', { offset:'100%','stop-color':'#67E8F9' })
          )
        : h('linearGradient', { id: gid+'-s' }, h('stop', { offset:'0%', 'stop-color': color||'#2DD4BF' })),
      h('linearGradient', { id: gid+'-f', x1:0, y1:0, x2:0, y2:1 },
        h('stop', { offset:'0%',  'stop-color': color || '#2DD4BF', 'stop-opacity':'0.20' }),
        h('stop', { offset:'100%','stop-color': color || '#2DD4BF', 'stop-opacity':'0' })
      )
    ),
    h('path', { d: d + ` L${W},${H} L0,${H} Z`, fill: `url(#${gid}-f)` }),
    h('path', { d, fill:'none', stroke:`url(#${gid}-s)`, 'stroke-width':'2.4', 'vector-effect':'non-scaling-stroke', 'stroke-linecap':'round', 'stroke-linejoin':'round' })
  );
}

function btnAccent(T) { return { background: T.accent, color: T.accentInk, border:'none', fontFamily:T.fontBody, fontSize:14, fontWeight:700, letterSpacing:'-0.01em', padding:'10px 18px', borderRadius: T.rChip, cursor:'pointer', display:'inline-flex', alignItems:'center', gap:6, boxShadow:'0 1px 0 rgba(255,255,255,.4) inset, 0 6px 14px -6px rgba(0,168,112,.5)' }; }

function SectionTitle({ T, kicker, children, size=24 }) {

/* Card primitive */
function Card({ T, children, style, hover=false, onClick, tint }) {
  const base = {
    background: tint && T.surfaceTinted ? `linear-gradient(135deg, ${T.surface} 0%, ${T.g2}10 100%)` : T.surface,
    border: T.cardBorder ? `1px solid ${T.hairline}` : 'none',
    borderRadius: T.rCard,
    boxShadow: T[T.cardShadow] || (T.cardShadow==='none' ? 'none' : T.sh1),
    transition: 'transform .15s, box-shadow .2s',
    cursor: onClick ? 'pointer' : 'default',
  };
  return h('div', { onClick, style: { ...base, ...(style||{}) } }, children);
}

/* Filled chip ("Saved", platform pill, etc) */
function Chip({ T, children, color, kind='soft' }) {
  if (kind==='solid') return h('span', { style: { background: color || T.ink, color: '#fff', fontFamily: T.fontMono, fontSize: 10.5, fontWeight: 600, letterSpacing:'0.08em', padding:'3px 9px', borderRadius: T.rChip, textTransform:'uppercase' } }, children);
  return h('span', { style: { background: T.surfaceHi, color: T.body, fontFamily: T.fontMono, fontSize: 11, fontWeight: 500, letterSpacing:'0.04em', padding:'4px 10px', borderRadius: T.rChip, border:`1px solid ${T.hairline}`, display:'inline-flex', alignItems:'center', gap:6 } },
    color && h('span', { style: { width:6, height:6, borderRadius:'50%', background: color } }),
    children
  );
}

/* Heat pill */
function HeatPill({ T, heat }) {
  const c = heatColor(heat);
  return h('span', { style: { display:'inline-flex', alignItems:'center', gap:6, padding:'4px 11px', borderRadius: T.rChip, fontFamily: T.fontMono, fontSize:10.5, fontWeight:700, letterSpacing:'0.08em', background: c+'1a', color: c, textTransform:'uppercase' } },
    h('span', { style: { width:6, height:6, borderRadius:'50%', background: c, boxShadow: `0 0 0 3px ${c}33`, animation: heat==='viral'?'blink 1.4s infinite':'none' } }),
    heatLabel(heat)
  );
}

/* Evidence chips — one real number per platform a theme shows up on. Replaces a
   single platform identity, because a theme is topic-first and can span many. */
function EvidenceChips({ T, evidence }) {
  const ev = evidence || [];
  if (!ev.length) return null;
  return h('div', { style: { display:'flex', flexWrap:'wrap', gap: 6, alignItems:'center' } },
    ev.map((e, i) => {

      return e.url
        ? h('a', { key: i, href: e.url, target:'_blank', rel:'noopener', style: { textDecoration:'none' } }, inner)

/* SCAN — animated waveform with Cadence gradient */
function ScanScreen({ T, statusMsg, platCount }) {
  const t = useTick();  // self-animating ripple; no longer driven by an App-level tick
  // Honest progress: reflect the actual scan pipeline stage rather than a timed fake.
  // Ordered to match the setStatusMsg() calls in runScan(); optional stages that get
  // skipped (e.g. TikTok/Reddit not selected) simply advance the bar forward.
  const SCAN_STAGES = [
    'pulling tiktok data…',
    'pulling reddit posts…',
    'researching posting times…',
    'checking google trends…',
    'analysing signals…',
  ];
  const stageIdx = SCAN_STAGES.indexOf(statusMsg);
  // +1 segment reserved for the final result hand-off, so the last in-flight stage
  // tops out below 100% instead of pretending the scan is finished.
  const pct = stageIdx < 0 ? 4 : Math.round(((stageIdx + 1) / (SCAN_STAGES.length + 1)) * 100);
  return h('div', { style: { flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding: 48, gap: 22, background: T.canvas } },
    /* gradient pulse rings */
    h('div', { style: { position:'relative', width: 220, height: 220, display:'flex', alignItems:'center', justifyContent:'center', marginBottom: 8 } },
      [0,1,2].map(i => h('div', { key: i, style: { position:'absolute', inset: 0, borderRadius:'50%', border:`2px solid ${T.g2}`, opacity: Math.max(0, 0.5 - i*0.18 - (t*0.5%1)*0.3), transform: `scale(${0.4 + (t*0.4 + i*0.33) % 1 * 0.9})`, transition: 'none' } })),
      h('div', { style: { width: 96, height: 96, borderRadius:'50%', background:`linear-gradient(135deg, ${T.g1} 0%, ${T.g2} 50%, ${T.g3} 100%)`, display:'flex', alignItems:'center', justifyContent:'center', boxShadow:`0 12px 40px ${T.g2}66` } },
        h(Mark, { size: 48 })
      )
    ),
    h('div', { style: { ...eb(T), display:'flex', alignItems:'center', gap: 8 } },
      h(LiveDot, { color: T.accent, size: 7 }), 'SCANNING'
    ),
    h('h2', { style: { fontFamily: T.fontBody, fontSize: 36, fontWeight: 700, letterSpacing:'-0.025em', margin: 0, color: T.ink, textAlign:'center' } }, `Reading ${platCount} data sources`),
    h('div', { style: { width: 360, height: 4, borderRadius: 2, background: T.hairline, overflow:'hidden' } },
      h('div', { style: { width: `${pct}%`, height:'100%', background: `linear-gradient(105deg, ${T.g1}, ${T.g2}, ${T.g3})`, transition:'width .15s linear' } })
    ),
    h('div', { style: { ...mono(T), color: T.bodyMid, textTransform:'uppercase', letterSpacing:'0.08em' } }, statusMsg || 'initialising…')
  );
}

/* RESULTS */
function ResultScreen({ T, isMobile, t, trends, niche, savedIds, toggleSave, onBack, onOpenStudio }) {
  const [idx, setIdx] = useState(0);
  const [planOpen, setPlanOpen] = useState(false);
  const [angle, setAngle] = useState('');
  const [cta, setCta] = useState('Get comments / engagement');
  const [plen, setPlen] = useState('Medium (3-5 sentences)');
  const [pdate, setPdate] = useState('');
  const [genOut, setGenOut] = useState('');
  const [genLoading, setGenLoading] = useState(false);
  const [copied, setCopied] = useState(false);
  const tr = trends[idx] || trends[0];
  useEffect(() => { setPlanOpen(false); setGenOut(''); setAngle(tr?.contentAngles?.[0] || ''); }, [idx]);
  if (!tr) return null;
  const saved = savedIds.includes(tr.id);
  const platKey = (tr.platform||'').toLowerCase().replace(/\s/g,'_');
  const platBrand = PLAT[platKey] || { dot: '#2DD4BF' };

  /* Metric tiles — third element flags whether the value is computed from real
     data. Only "Likes / view" is real (and only when a trend is YouTube-backed
     and we aggregated likes÷views from the pulled videos). Everything else is a
     model estimate and must be visibly labelled "est." so it never reads as real. */
  const metrics = [
    ['Likes / view', tr.engagementRate||'—', !!tr.engagementRateReal],
    ['Competition',  tr.competition||'—',    false],
    // Search interest is a real measured Google Trends value (Low/Medium/High).
    // Only show the tile when we have one this scan — never render a placeholder.
    ...(tr.searchInterestLabel ? [['Search interest', tr.searchInterestLabel, true]] : []),
    // Best time is computed from real post timestamps; only render when real.
    ...(tr.bestTimeToPostReal ? [['Best time', tr.bestTimeToPost, true]] : []),
  ];
  const EstTag = () => h('span', { style: { fontFamily: T.fontMono, fontSize: 9, letterSpacing:'0.07em', color: T.mute, border:`1px solid ${T.hairline}`, borderRadius: 4, padding:'0 4px', marginLeft: 6, textTransform:'uppercase', verticalAlign:'middle' } }, 'est.');
  const isLive = tr.dataSource==='tiktok_live' || tr.dataSource==='youtube_live';
  const liveLabel = tr.dataSource==='tiktok_live' ? 'TikTok · Live data' : tr.dataSource==='youtube_live' ? 'YouTube · Live data' : 'AI signal';

  const doGen = async () => {
    setGenLoading(true); setGenOut('');
    try {
      const text = await claudeCall(`Write a complete ${tr.platform} ${tr.format||'post'} for ${niche}.
Trend: ${tr.title} | Angle: ${angle||'general'} | CTA: ${cta} | Length: ${plen}
Hook: "${tr.captionHook||''}" | Hashtags: ${(tr.hashtags||[]).join(' ')}
${tr.realVideos?.length?'\nReal TikTok context:\n'+tr.realVideos.slice(0,3).map(v=>`"${v.desc}" — ${fmt(v.views)} views`).join('\n'):''}

HOOK — scroll-stopping first 1-2 lines
BODY — main content
CTA — one clear call to action
HASHTAGS — 10-15 tags
POSTING NOTES — ${tr.bestTimeToPost||'best time'}, visual direction

Human, authentic, platform-native voice.

${STYLE}`);
      setGenOut(cleanCopy(text));
    } catch (e) { setGenOut('Error: ' + e.message); }
    setGenLoading(false);
  };
  const addCal = () => { if (!pdate) { alert('Select a date first.'); return; } const c = store.get('cp_calendar',[]); c.push({ id:'cal_'+Date.now(), title: tr.title, platform: tr.platform, date: pdate, content: genOut, addedAt: new Date().toISOString() }); store.set('cp_calendar', c); alert('Added to calendar.'); };
  const addIdeas = () => { const i = store.get('cp_ideas',[]); i.push({ id:'idea_'+Date.now(), title: tr.title, platform: tr.platform, format: tr.format, content: genOut, addedAt: new Date().toISOString() }); store.set('cp_ideas', i); alert('Saved to ideas bank.'); };

  /* Angles + hashtags — surfaced on the main trend card itself (not the side rail) */

  /* Main hero card */
  function HeroCard() {
      return h('div', { style: { background: T.surface, borderRadius: 22, padding:'28px 32px', boxShadow: T.sh3, position:'relative', overflow:'hidden' } },

        h('div', { style: { background:`linear-gradient(105deg, ${T.g1}1a, ${T.g3}1a)`, borderRadius: 14, padding:'14px 18px' } },

function StudioTab({ T, isMobile, prefillTrend, clearPrefill }) {

  const [openSec, setOpenSec] = useState(null);

  useEffect(() => { if (!prefillTrend) return; setTopic(prefillTrend.title||''); setPlatform(prefillTrend.platform||'TikTok'); setFormat((prefillTrend.format||'').toLowerCase().includes('carousel') ? 'carousel' : 'reel'); clearPrefill(); }, [prefillTrend]);

  const generate = async () => {
    if (!topic.trim()) { alert('Enter a topic first.'); return; }
    setLoading(true); setResult(null);
    const isReel = format === 'reel';
    const prompt = isReel
      ? `Expert short-form video director. Create a complete production plan for a ${platform} Reel/TikTok.
TOPIC: ${topic} | AUDIENCE: ${audience||'General'} | TONE: ${tone} | GOAL: ${goal} | DURATION: ${duration} | MUSIC: ${music}

${STYLE}

Return ONLY valid JSON: {"title":"Punchy title","logline":"One sentence concept","hook":"First 3 seconds word for word","shots":[{"timecode":"0:00-0:03","type":"Hook","visual":"Exactly what camera shows","audio":"Word for word script","direction":"Director note"}],"broll":["B-roll 1","B-roll 2","B-roll 3"],"music":{"recommendation":"Specific song or style","reasoning":"Why this works","alternatives":["Alt 1","Alt 2"],"searchTerms":["TikTok search term"]},"caption":{"hook":"First caption line","body":"Main caption","cta":"Call to action","hashtags":["#tag1","#tag2","#tag3","#tag4","#tag5","#tag6","#tag7","#tag8"]},"editingNotes":"Key editing instructions","postingTip":"One specific tip"}

      : `Expert Instagram carousel strategist. Create a complete slide-by-slide plan.

${STYLE}

Generate 7-9 slides.`;
    try {
      const text = await claudeCall(prompt);
      const m = text.match(/\{[\s\S]*\}/);
      setResult({ format, data: deepClean(JSON.parse(m ? m[0] : text)) });
      setOpenSec(isReel ? 'shots' : 'slides');
    } catch (e) { alert('Generation failed: ' + e.message); }
    setLoading(false);
  };

  const saveIdeas = () => { if (!result) return; const i = store.get('cp_ideas',[]); i.push({ id:'idea_'+Date.now(), title: result.data.title||topic, platform, format, content: JSON.stringify(result.data, null, 2), addedAt: new Date().toISOString() }); store.set('cp_ideas', i); alert('Saved!'); };

      h('button', { onClick: ()=>setOpenSec(open ? null : id), style: { width:'100%', background: T.surfaceHi, border:'none', color: T.ink, cursor:'pointer', padding:'14px 18px', display:'flex', alignItems:'center', justifyContent:'space-between', fontFamily: T.fontBody, fontSize: 14, fontWeight: 600 } },

    h('div', { style: { borderRight: (!isMobile && result) ? `1px solid ${T.hairline}` : 'none', overflowY: isMobile ? 'visible' : 'auto', padding: isMobile ? '20px 16px 32px' : '32px 36px 40px', ...(!result && !isMobile && { maxWidth: 620, margin: '0 auto' }), background: T.canvas } },
      h('div', { style: { marginBottom: 24 } },
        h(Eyebrow, { T, text: 'Content Studio', color: T.accentDeep }),
        h('h2', { style: { fontFamily: T.fontBody, fontSize: 34, fontWeight: 700, letterSpacing:'-0.025em', lineHeight: 1.05, margin:'10px 0 8px', color: T.ink } }, 'Build your next post.'),
        h('p', { style: { fontFamily: T.fontBody, fontSize: 15, color: T.body, lineHeight: 1.5, margin: 0 } }, 'Describe what you want to make. Get a full production plan — shots, slides, music, and caption.')
      ),
      h('div', { style: { marginBottom: 20 } },
        h('div', { style: { ...eb(T), marginBottom: 10 } }, 'Format'),
        h('div', { style: { display:'grid', gridTemplateColumns:'1fr 1fr', gap: 8 } },
          [['reel','Reel / TikTok','Shot-by-shot + music'],['carousel','Carousel','Slide order + design']].map(([id,label,sub]) =>
            h('button', { key: id, onClick: ()=>setFormat(id), style: { background: format===id ? T.surfaceHi : T.surface, border:`1.5px solid ${format===id ? T.ink : T.hairline}`, borderRadius: T.rTile, padding:'14px', cursor:'pointer', textAlign:'left' } },

      h('div', { style: { display:'grid', gridTemplateColumns:'1fr 1fr', gap: 12, marginBottom: 16 } },
        h('div', null, h('div', { style: { ...eb(T), marginBottom: 8 } }, 'Audience'), h('input', { value: audience, onInput: e => setAudience(e.target.value), placeholder:'Gen Z, moms…', style: inputStyle(T) })),
        h('div', null, h('div', { style: { ...eb(T), marginBottom: 8 } }, 'Tone'), h('select', { value: tone, onChange: e => setTone(e.target.value), style: inputStyle(T) }, TONE_DEFS.map(tn => h('option', { key: tn.id, value: tn.id }, tn.l))))
      ),
      h('div', { style: { marginBottom: 16 } }, h('div', { style: { ...eb(T), marginBottom: 8 } }, 'Goal'), h('div', { style: { display:'flex', gap: 6, flexWrap:'wrap' } }, [['engagement','Engagement'],['saves','Saves'],['follows','Follows'],['clicks','Link clicks'],['shares','Shares']].map(([id,l]) => Chip(l, goal===id, ()=>setGoal(id))))),
      format==='reel' && h('div', null,
        h('div', { style: { marginBottom: 16 } }, h('div', { style: { ...eb(T), marginBottom: 8 } }, 'Duration'), h('div', { style: { display:'flex', gap: 6 } }, ['7-15s','15-30s','30-60s','60-90s'].map(d => Chip(d, duration===d, ()=>setDuration(d))))),
        h('div', { style: { marginBottom: 16 } }, h('div', { style: { ...eb(T), marginBottom: 8 } }, 'Music vibe'), h('div', { style: { display:'flex', gap: 6, flexWrap:'wrap' } }, MUSIC_OPTS.map(g => Chip(g.l, music===g.id, ()=>setMusic(g.id)))))

      h('button', { onClick: generate, disabled: loading, style: { ...btnAccent(T), width:'100%', justifyContent:'center', padding:'14px 0', fontSize: 15, opacity: loading ? 0.5 : 1 } }, loading ? 'Building your plan…' : `Build ${format==='reel'?'Reel':'Carousel'} plan →`)
    ),
    result && h('div', { style: { overflowY: isMobile ? 'visible' : 'auto', padding: isMobile ? '20px 16px 32px' : '32px 36px 40px', borderTop: isMobile ? `1px solid ${T.hairline}` : 'none', background: T.canvas } },
      h('div', { style: { display:'flex', alignItems:'flex-start', justifyContent:'space-between', marginBottom: 22, gap: 12 } },

/* ════════════════════════════════════════════════════════════════════════════
   CALENDAR
   ════════════════════════════════════════════════════════════════════════════ */
function CalendarTab({ T, isMobile, niche, platforms }) {
  const [items, setItems] = useState(store.get('cp_calendar', []));
  const [loading, setLoading] = useState(false);
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const today = new Date(); today.setHours(0,0,0,0);
  const start = new Date(today); start.setDate(today.getDate() - today.getDay());

  const autoFill = async () => {
    if (!niche) { alert('Run a scan first to set your niche.'); return; }
    setLoading(true);
    try {
      const text = await claudeCall(`Generate a 7-day social media content calendar for niche: ${niche}. Platforms: ${platforms.join(', ')}.

${STYLE}

Return ONLY a JSON array: [{"day":"Monday","date":"2026-05-25","platform":"TikTok","format":"Short video","title":"Specific post topic"},...]`);
      const m = text.match(/\[[\s\S]*\]/);
      const newItems = deepClean(JSON.parse(m ? m[0] : text));
      const updated = [...items, ...newItems.map((item,i) => ({ id:`auto_${Date.now()}_${i}`, title: item.title, platform: item.platform, date: item.date, format: item.format, content:'', addedAt: new Date().toISOString() }))];
      store.set('cp_calendar', updated); setItems(updated);
    } catch (e) { alert('Failed: ' + e.message); }
    setLoading(false);
  };

  const fmtAccent = (i) => FORMAT_ACCENTS[i % FORMAT_ACCENTS.length];

  return h('div', { style: { padding: isMobile ? '20px 16px' : '32px 40px', overflowY: isMobile ? 'visible' : 'auto', height: isMobile ? 'auto' : '100%', background: T.canvas } },
    h('div', { style: { display:'flex', alignItems:'flex-end', justifyContent:'space-between', marginBottom: 24, gap: 16 } },
      h('div', null,
        h(Eyebrow, { T, text: 'Content calendar' }),
        h('h2', { style: { fontFamily: T.fontBody, fontSize: 30, fontWeight: 700, letterSpacing:'-0.025em', margin:'8px 0 0', color: T.ink } }, today.toLocaleDateString('en-US',{ month:'long', year:'numeric' }))
      ),
      h('button', { onClick: autoFill, disabled: loading, style: { ...btnAccent(T), opacity: loading ? 0.5 : 1 } }, loading ? 'Generating…' : '⚡ Auto-fill week →')
    ),
    h('div', { style: { display:'grid', gridTemplateColumns: isMobile ? '1fr' : 'repeat(7,1fr)', gap: 10 } },
      Array.from({ length: 7 }, (_,i) => {
        const d = new Date(start); d.setDate(start.getDate() + i);
        const ds = d.toISOString().split('T')[0];
        const posts = items.filter(c => c.date === ds);
        const isT = d.toDateString() === today.toDateString();
        return h('div', { key: i, style: { background: T.surface, border:`1px solid ${isT ? T.ink : T.hairline}`, borderRadius: T.rTile, padding:'12px 12px', minHeight: 130, boxShadow: isT ? T.sh2 : T.sh1 } },
          h('div', { style: mono(T) }, days[d.getDay()].toUpperCase()),
          h('div', { style: { fontFamily: T.fontBody, fontSize: 22, fontWeight: 700, letterSpacing:'-0.02em', color: isT ? T.ink : T.bodyMid, marginTop: 4, marginBottom: 10 } }, d.getDate()),
          posts.map((p,pi) => { const a = fmtAccent(pi); return h('div', { key: pi, style: { background: a.bg, color: a.fg, borderRadius: 4, fontSize: 11, fontFamily: T.fontBody, fontWeight: 500, padding:'4px 7px', marginBottom: 4, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' } }, p.title); })
        );
      })
    )
  );
}

/* ════════════════════════════════════════════════════════════════════════════
   APP
   ════════════════════════════════════════════════════════════════════════════ */
function App() {
  const [dark, setDark] = useState(store.get('cadence_dark', false));
  const T = useMemo(() => themeFor(dark), [dark]);
  useEffect(() => { store.set('cadence_dark', dark); }, [dark]);

  // ── Responsive ─────────────────────────────────────────────────────────────
  // Below the mobile breakpoint the shell switches from a fixed-viewport desktop
  // layout to normal document flow: the page itself scrolls and internal panes no
  // longer lock to viewport height / hide overflow. (Multi-column grids collapse to
  // a single column via the !important media queries in the <style> block.)
  const MOBILE_Q = '(max-width: 900px)';
  const [isMobile, setIsMobile] = useState(() => typeof window !== 'undefined' && window.matchMedia(MOBILE_Q).matches);
  useEffect(() => {
    const mq = window.matchMedia(MOBILE_Q);
    const onChange = () => setIsMobile(mq.matches);
    onChange();
    if (mq.addEventListener) mq.addEventListener('change', onChange);
    else mq.addListener(onChange);
    window.addEventListener('orientationchange', onChange);
    return () => {
      if (mq.removeEventListener) mq.removeEventListener('change', onChange);
      else mq.removeListener(onChange);
      window.removeEventListener('orientationchange', onChange);
    };
  }, []);

  const [tab, setTab] = useState('home');
  const [scanPhase, setScanPhase] = useState('setup');
  const [showKeys, setShowKeys] = useState(false);
  const [statusMsg, setStatusMsg] = useState('');
  const [niche, setNiche] = useState('');
  const [audience, setAudience] = useState('');
  const [platforms, setPlatforms] = useState(['tiktok','youtube','instagram','reddit','google_trends']);
  const [formats, setFormats] = useState(['Reels/Video','Carousel']);
  const [tone, setTone] = useState('educational');
  const [extra, setExtra] = useState('');
  const [trends, setTrends] = useState([]);
  const [scanError, setScanError] = useState('');
  const [savedIds, setSavedIds] = useState(store.get('cp_saved_ids', []));
  const [studioTrend, setStudioTrend] = useState(null);
  // No App-level animation tick: leaf components (Sparkline, ScanScreen) own their
  // own ticks. This keeps the result/carousel screen from re-rendering ~60fps, which
  // previously remounted the trend card every frame and made the pager unresponsive.

  useEffect(() => {
    document.body.style.background = T.canvas;
    document.body.style.color = T.ink;
    const splash = document.getElementById('splash');
    if (splash) splash.remove();
  }, [T]);

  const togglePlat = id => setPlatforms(p => p.includes(id) ? p.filter(x => x!==id) : [...p, id]);
  const toggleFmt = f => setFormats(p => p.includes(f) ? p.filter(x => x!==f) : [...p, f]);
  const toggleSave = id => { const n = savedIds.includes(id) ? savedIds.filter(x => x!==id) : [...savedIds, id]; setSavedIds(n); store.set('cp_saved_ids', n); };

  // ── Primary scan path: the live trend engine (POST /api/scan) ──────────────
  // Cadence decides what qualifies from REAL measured numbers; Claude only
  // writes the creative layer. The old client-side path below is kept ONLY as a
  // fallback so a bad deploy can never brick scanning.
  const runScan = async (nicheOverride) => {
    const override = typeof nicheOverride === 'string' ? nicheOverride : '';
    const scanNiche = override || niche;
    if (!scanNiche.trim()) { alert('Enter your niche first.'); return; }
    if (override) setNiche(override);
    setTab('scanner');
    setScanPhase('scan');
    setTrends([]);
    setScanError('');

    try {
      setStatusMsg('reading sources…');
      const r = await fetch('/api/scan', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'same-origin',
        body: JSON.stringify({ niche: scanNiche, audience, platforms, formats, tone, extra, profile: store.get('cp_brand_profile', null), tz: Intl.DateTimeFormat().resolvedOptions().timeZone })
      });
      if (!r.ok) throw new Error('scan HTTP ' + r.status);
      const data = await r.json();
      if (data.error) throw new Error(data.error.message || 'scan error');

      const engineThemes = data.trends || [];
      // Engine answered. Zero themes (or an explicit note) is an honest empty
      // result, NOT a reason to silently fall back to the old local scan.
      if (!engineThemes.length || data.note) {
        setScanPhase('empty');
        return;
      }
      setStatusMsg('writing angles…');
      setTrends(engineThemes.map(mapEngineTrend));
      setScanPhase('result');
    } catch (e) {
      // Engine failed to answer -> honest error with a retry button. We never
      // call runScanLocal automatically; it stays in the file as a manual escape.
      console.warn('[scan] engine error:', e.message);
      setScanError(e.message || 'Something went wrong.');
      setScanPhase('error');
    }
  };

  const runScanLocal = async (scanNiche) => {
    const rapidKey = store.get('cp_rapidapi_key', DEFAULT_RAPID_KEY);

    let tiktokVideos = [];
    if (platforms.includes('tiktok')) {
      try {
        setStatusMsg('pulling tiktok data…');
        const search = await tokGet('/v1/search/post?keyword=' + encodeURIComponent(scanNiche) + '&count=15&offset=0');
        tiktokVideos = parseVideos(search).slice(0, 15);
      } catch (e) { console.warn('TikTok:', e.message); }
    }

    // ── YouTube pull (parallel to TikTok) — quota-conscious: at most 2 calls. ──
    // One search.list (recent video IDs for the niche) + one videos.list to
    // resolve real view/like/comment counts. NEVER loop the search call.
    let youtubeVideos = [];
    if (platforms.includes('youtube')) {
      try {
        setStatusMsg('pulling youtube data…');
        const sr = await fetch('/api/youtube/search?part=snippet&type=video&order=date&maxResults=15&q=' + encodeURIComponent(scanNiche), { credentials:'same-origin' });
        console.log('[youtube] search.list HTTP', sr.status, sr.ok ? 'ok' : 'FAILED');
        if (sr.ok) {
          const sd = await sr.json();
          if (sd.error) console.warn('[youtube] search.list API error:', sd.error?.message || JSON.stringify(sd.error));
          const ids = (sd.items||[]).map(it => it?.id?.videoId).filter(Boolean);
          console.log('[youtube] video IDs extracted:', ids.length);
          if (ids.length) {
            const vr = await fetch('/api/youtube/videos?part=snippet,statistics&id=' + encodeURIComponent(ids.join(',')), { credentials:'same-origin' });
            console.log('[youtube] videos.list HTTP', vr.status, vr.ok ? 'ok' : 'FAILED');
            if (vr.ok) {
              const vd = await vr.json();
              if (vd.error) console.warn('[youtube] videos.list API error:', vd.error?.message || JSON.stringify(vd.error));
              console.log('[youtube] videos returned by API:', (vd.items||[]).length);
              youtubeVideos = (vd.items||[]).map(it => {
                const s = it.statistics || {};
                return {
                  id: it.id,
                  title: (it.snippet?.title || '').substring(0, 90),
                  viewCount: parseInt(s.viewCount, 10) || 0,
                  likeCount: parseInt(s.likeCount, 10) || 0,
                  commentCount: parseInt(s.commentCount, 10) || 0,
                  publishedAt: it.snippet?.publishedAt || '',
                  url: it.id ? 'https://www.youtube.com/watch?v=' + it.id : null,
                };
              }).filter(v => v.viewCount > 0 || v.likeCount > 0)
                .sort((a, b) => b.viewCount - a.viewCount);
            }
          }
        }
        console.log('[youtube] final youtubeVideos array length:', youtubeVideos.length);
      } catch (e) { console.warn('[youtube] pull threw:', e.message); }
    } else {
      console.log('[youtube] SKIPPED — "youtube" not in selected platforms:', platforms.join(','));
    }

    let redditPosts = [];
    if (platforms.includes('reddit')) {
      try { setStatusMsg('pulling reddit posts…'); redditPosts = await fetchReddit(scanNiche); }
      catch (e) { console.warn('Reddit:', e.message); }
    }

    // ── FIX 2: web search runs in two small focused calls BEFORE JSON generation ──
    // Call A: posting times (search, tiny output)
    setStatusMsg('researching posting times…');
    let postingTimeData = '';
    try {
      postingTimeData = await claudeCall(
        `Best posting times on ${platforms.join(' and ')} for ${scanNiche} niche in 2025-2026. ` +
        `Reply in under 120 words: best days, hours, timezone. Be specific.`,
        true, 400
      );
    } catch (e) { console.warn('Posting time:', e.message); }

    // Call B: Google Trends signal (search, tiny output)
    setStatusMsg('checking google trends…');
    let googleSignal = '';
    try {
      googleSignal = await claudeCall(
        `What search queries are rising right now on Google Trends for the "${scanNiche}" niche? ` +
        `List the top 5 rising queries only. No explanation, just the queries.`,
        true, 300
      );
    } catch (e) { console.warn('Google Trends:', e.message); }

    // ── FIX 3 & 4: JSON generation — no web search, 5 trends, trimmed schema ──
    setStatusMsg('analysing signals…');
    // FIX 3: trim to 5 videos/posts fed in (was 8)
    const videoCtx = tiktokVideos.length
      ? tiktokVideos.slice(0,5).map((v,i) => `${i+1}. "${v.desc}" — ${fmt(v.views)} views, ${fmt(v.likes)} likes`).join('\n')
      : 'No TikTok data.';
    const redditCtx = redditPosts.length
      ? redditPosts.slice(0,5).map((p,i) => `${i+1}. r/${p.subreddit} | "${p.title}" | Score: ${p.score}`).join('\n')
      : 'No Reddit data.';
    // Real recent YouTube videos — fed in exactly like videoCtx so trend
    // identification is grounded in real videos (with real view/like counts).
    const youtubeCtx = youtubeVideos.length
      ? youtubeVideos.slice(0,5).map((v,i) => `${i+1}. "${v.title}" — ${fmt(v.viewCount)} views, ${fmt(v.likeCount)} likes`).join('\n')
      : 'No YouTube data.';
    console.log('[youtube] youtubeCtx injected into Claude prompt:\n' + youtubeCtx);

    // FIX 4: schema trimmed — removed postingTimeRationale, topVideoViews,
    //         googleTrendSignal, redditSignal (saves ~30% output tokens per trend)
    const prompt = `Senior social media strategist. Analyse this live data and return trend intelligence.
NICHE: ${scanNiche} | AUDIENCE: ${audience||'General'} | PLATFORMS: ${platforms.join(', ')} | FORMATS: ${formats.length?formats.join(', '):'any'} | TONE: ${tone}
${extra?'CONTEXT: '+extra:''}
LIVE TIKTOK DATA:
${videoCtx}
LIVE YOUTUBE DATA (real recent videos, real counts):
${youtubeCtx}
LIVE REDDIT DATA:
${redditCtx}
POSTING TIMES: ${postingTimeData||'Use best knowledge.'}
GOOGLE TRENDS SIGNALS: ${googleSignal||'Not available.'}
Return ONLY valid JSON — no markdown, no explanation:
{"summary":{"totalTrends":5,"hotTopics":2,"avgEngagement":"4.2%","bestDay":"Tuesday","bestTimeOverall":"6-8 PM EST","liveVideosPulled":${tiktokVideos.length}},"trends":[{"id":"t1","rank":1,"title":"Specific trend title","hook":"Why trending + winning angle (2 sentences)","platform":"TikTok","format":"Short video","heat":"viral","engagementRate":"6.8%","searchVolume":"High","competition":"Medium","hashtags":["#tag1","#tag2","#tag3","#tag4","#tag5"],"contentAngles":["Angle 1","Angle 2","Angle 3"],"captionHook":"First line that stops the scroll","dataSource":"tiktok_live"}]}
5 trends. heat = "rising","hot","viral".
Set each trend's "dataSource" to the live block it is actually drawn from: tiktok_live (from LIVE TIKTOK DATA), youtube_live (from LIVE YOUTUBE DATA), reddit_live (from LIVE REDDIT DATA), google_trends_live (from GOOGLE TRENDS SIGNALS); use instagram_ai or crossplatform_ai only for trends not grounded in any live block above. Do NOT default everything to tiktok_live.
${youtubeVideos.length ? `There ARE ${youtubeVideos.length} real YouTube videos above — ground at least ${Math.min(2, youtubeVideos.length)} trend(s) in them and mark those with "dataSource":"youtube_live" and "platform":"YouTube".` : ''}`;

    try {
      // FIX 2: useSearch=false — all research already done above
      const text = await claudeCall(prompt, false, 6000);
      const m = text.match(/\{[\s\S]*\}/);
      const parsed = JSON.parse(m ? m[0] : text);
      const result = (parsed.trends||[]).map((tr,i) => {
        const out = { ...tr, id: tr.id || 't' + (i+1),
          realVideos: tr.dataSource==='tiktok_live' ? tiktokVideos.slice(0,4) : [],
          redditPosts: tr.dataSource==='reddit_live' ? redditPosts.slice(0,3) : [],
          realYoutube: [] };
        // YouTube-backed trend: attach real videos and compute Likes / view from
        // real data (aggregate likes ÷ views), overriding the model's invented value.
        if (tr.dataSource==='youtube_live' && youtubeVideos.length) {
          const pool = youtubeVideos.slice(0,8);
          out.realYoutube = pool.slice(0,4);
          const agg = pool.reduce((a,v) => ({ likes: a.likes+v.likeCount, views: a.views+v.viewCount }), { likes:0, views:0 });
          if (agg.views > 0) {
            out.engagementRate = (agg.likes / agg.views * 100).toFixed(1) + '%';
            out.engagementRateReal = true;  // flips the "est." tag off for this tile
          }
        }
        // Best time to post: computed from the publish timestamps of the real
        // posts backing this trend. Honest-labelled — if we can't compute it, the
        // tile won't render (see bestTimeToPostReal gate). Never fabricate.
        const tsPool =
          tr.dataSource === 'tiktok_live'  ? (out.realVideos || []).map(v => (v.createTime || 0) * 1000) :
          tr.dataSource === 'youtube_live' ? (out.realYoutube || []).map(v => Date.parse(v.publishedAt || '') || 0) :
          [];
        const bt = computeBestTime(tsPool);
        if (bt) {
          out.bestTimeToPost = bt.label;
          out.bestTimeToPostReal = true;
          out.postingTimeRationale = bt.rationale;
        } else {
          out.bestTimeToPostReal = false;
        }
        return out;
      });
      setTrends(result);
      setScanPhase('result');
    } catch (e) {
      alert('Scan failed: ' + e.message);
      setScanPhase('setup');
    }
  };

  // On mobile, let the document flow + scroll naturally; on desktop keep the
  // fixed-viewport pane layout. These objects swap the height/overflow chain.
  const mainWrap = isMobile
    ? { flex: 1, minHeight: 0, overflow:'visible', display:'flex', flexDirection:'column' }
    : { flex: 1, height:'calc(100vh - 65px)', overflow:'hidden', display:'flex', flexDirection:'column' };
  const tabWrap = isMobile
    ? { flex: 1, overflow:'visible' }
    : { flex: 1, overflow:'hidden' };
  const scannerWrap = isMobile
    ? { flex:1, overflow:'visible', display:'flex', flexDirection:'column' }
    : { flex:1, overflow:'hidden', display:'flex', flexDirection:'column' };

  return h('div', { style: { position:'relative', background: T.canvas, color: T.ink, fontFamily: T.fontBody, minHeight:'100vh', display:'flex', flexDirection:'column' } },
    h(TopBar, { T, tab, setTab, savedCount: savedIds.length, showKeys: ()=>setShowKeys(true), dark, setDark }),

    tab==='home'
      ? h(LandingPage, { T, setTab, setNiche, niche, onScan: runScan })
      : h('div', { style: mainWrap },
          tab==='scanner' && h('div', { key:'sc', style: scannerWrap },
            scanPhase==='setup'  && h(ScannerSetup, { T, isMobile, niche, setNiche, audience, setAudience, platforms, togglePlat, formats, toggleFmt, tone, setTone, extra, setExtra, onScan: runScan }),
            scanPhase==='scan'   && h(ScanScreen, { T, statusMsg, platCount: platforms.length }),
            scanPhase==='empty'  && h(EmptyState, { T, niche, onRescan: ()=>runScan(), onBack: ()=>setScanPhase('setup') }),
            scanPhase==='error'  && h(ErrorState, { T, message: scanError, niche, onRetry: ()=>runScan(), onBack: ()=>setScanPhase('setup') }),
            scanPhase==='result' && h(ResultScreen, { T, isMobile, trends, niche, savedIds, toggleSave, onBack: ()=>setScanPhase('setup'), onOpenStudio: (tr)=>{ setStudioTrend(tr); setTab('studio'); } })
          ),
          tab==='studio'   && h('div', { key:'st', style: tabWrap }, h(StudioTab,   { T, isMobile, prefillTrend: studioTrend, clearPrefill: ()=>setStudioTrend(null) })),
          tab==='calendar' && h('div', { key:'ca', style: tabWrap }, h(CalendarTab, { T, isMobile, niche, platforms })),
          tab==='ideas'    && h('div', { key:'id', style: tabWrap }, h(IdeasTab,    { T, isMobile }))
        ),

    showKeys && h(KeysModal, { T, onClose: ()=>setShowKeys(false) })
  );
}

render(h(App, null), document.getElementById('root'));
</script>
</body>
</html>
